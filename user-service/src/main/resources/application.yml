server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/paypal_user
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jwt:
    secret: my-super-secret-key-that-you-never-share
